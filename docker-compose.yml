services:

  redis:
    image: redis:7-alpine
    container_name: lexguard_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: lexguard_postgres
    environment:
      POSTGRES_DB: lexguard
      POSTGRES_USER: lexguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexguard_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lexguard-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: lexguard-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-init:
    image: ollama/ollama:latest
    container_name: lexguard-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/sh -c "sleep 10 && OLLAMA_HOST=http://ollama:11434 ollama pull ${LLM_MODEL:-gemma2:2b} && echo 'Модель ${LLM_MODEL:-gemma2:2b} готова'"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexguard-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_MODEL=${LLM_MODEL:-gemma2:2b}
      - DATABASE_URL=postgresql://lexguard:${POSTGRES_PASSWORD:-lexguard_dev}@lexguard_postgres:5432/lexguard
      - REDIS_URL=redis://lexguard_redis:6379/0
      - CELERY_BROKER_URL=redis://lexguard_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://lexguard_redis:6379/0
    volumes:
      - ./backend:/app
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexguard_celery
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_MODEL=${LLM_MODEL:-gemma2:2b}
      - DATABASE_URL=postgresql://lexguard:${POSTGRES_PASSWORD:-lexguard_dev}@lexguard_postgres:5432/lexguard
      - REDIS_URL=redis://lexguard_redis:6379/0
      - CELERY_BROKER_URL=redis://lexguard_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://lexguard_redis:6379/0
    volumes:
      - ./backend:/app
    command: celery -A config.celery_app worker --loglevel=info -E
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lexguard-frontend
    ports:
      - "3000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  ollama_data: